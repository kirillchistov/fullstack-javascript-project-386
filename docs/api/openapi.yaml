openapi: 3.0.0
info:
  title: Call Calendar API
  version: 0.1.0
  description: |-
    Call Calendar — сервис «Запись на звонок».

    API-контракт (Design First): этот файл и соседние .tsp — единственный
    источник истины. Из них компилируется docs/api/openapi.yaml, по которому
    независимо реализуются бэкенд (Fastify) и фронтенд (React).

    Сценарии:
    - Гость: смотрит типы событий и свободные слоты, бронирует звонок.
    - Владелец: входит по логину/паролю, настраивает правила доступности,
    смотрит и отменяет предстоящие встречи.
tags:
  - name: Session
  - name: Guest
  - name: Owner
paths:
  /api/availability:
    get:
      operationId: AvailabilityRoutes_getAvailability
      description: Текущие настройки доступности
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Availability'
        '401':
          description: 401 — нет активной сессии владельца или неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
      tags:
        - Owner
      security:
        - ApiKeyAuth: []
    put:
      operationId: AvailabilityRoutes_updateAvailability
      description: |-
        Полная замена настроек доступности.
        Интервалы каждого правила должны быть кратны 30 минутам и не пересекаться в рамках дня.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Availability'
        '401':
          description: 401 — нет активной сессии владельца или неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: 422 — ошибка валидации входных данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      tags:
        - Owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Availability'
      security:
        - ApiKeyAuth: []
  /api/bookings:
    post:
      operationId: BookingRoutes_create
      description: |-
        Гость создаёт бронирование на свободный слот.
        409 — слот уже занят или находится в прошлом.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '409':
          description: '409 — конфликт: слот уже занят или находится в прошлом'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
        '422':
          description: 422 — ошибка валидации входных данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      tags:
        - Guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
    get:
      operationId: BookingRoutes_list
      description: Владелец смотрит список предстоящих встреч (только активные, от текущего момента)
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '401':
          description: 401 — нет активной сессии владельца или неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
      tags:
        - Owner
      security:
        - ApiKeyAuth: []
  /api/bookings/{id}:
    delete:
      operationId: BookingRoutes_cancel
      description: Владелец отменяет встречу (перевод в статус cancelled, слот снова свободен)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: 401 — нет активной сессии владельца или неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: 404 — ресурс не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      tags:
        - Owner
      security:
        - ApiKeyAuth: []
  /api/event-types:
    get:
      operationId: EventTypeRoutes_list
      description: Список типов событий, на которые можно записаться
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
      tags:
        - Guest
  /api/session:
    post:
      operationId: SessionRoutes_login
      description: Вход владельца. Устанавливает сессионную cookie.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: 401 — нет активной сессии владельца или неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: 422 — ошибка валидации входных данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      tags:
        - Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
    get:
      operationId: SessionRoutes_current
      description: Текущая сессия (проверка «я залогинен?»)
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: 401 — нет активной сессии владельца или неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
      tags:
        - Session
      security:
        - ApiKeyAuth: []
    delete:
      operationId: SessionRoutes_logout
      description: Выход владельца. Удаляет сессию.
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Session
      security:
        - ApiKeyAuth: []
  /api/slots:
    get:
      operationId: SlotRoutes_list
      description: |-
        Свободные слоты за период [from, to] включительно.
        Слоты вычисляются из правил доступности за вычетом активных бронирований;
        слоты в прошлом не возвращаются.
      parameters:
        - name: from
          in: query
          required: true
          description: Начало периода, YYYY-MM-DD
          schema:
            type: string
            format: date
          explode: false
        - name: to
          in: query
          required: true
          description: Конец периода, YYYY-MM-DD
          schema:
            type: string
            format: date
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Slot'
        '422':
          description: 422 — ошибка валидации входных данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      tags:
        - Guest
components:
  schemas:
    Availability:
      type: object
      required:
        - timezone
        - rules
      properties:
        timezone:
          type: string
          description: Часовой пояс владельца, IANA-идентификатор (например, Europe/Moscow)
        rules:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityRule'
      description: 'Настройки доступности владельца: часовой пояс + набор недельных правил'
      example:
        timezone: Europe/Moscow
        rules:
          - weekday: 1
            startTime: '10:00'
            endTime: '18:00'
          - weekday: 3
            startTime: '10:00'
            endTime: '14:00'
    AvailabilityRule:
      type: object
      required:
        - weekday
        - startTime
        - endTime
      properties:
        weekday:
          type: integer
          format: int32
          minimum: 1
          maximum: 7
          description: 'День недели по ISO 8601: 1 — понедельник … 7 — воскресенье'
        startTime:
          type: string
          pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
          description: Начало интервала, локальное время владельца в формате HH:MM
        endTime:
          type: string
          pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
          description: Конец интервала, локальное время владельца в формате HH:MM
      description: |-
        Правило доступности: повторяющийся недельный интервал,
        в котором владелец готов принимать звонки (например, Пн 10:00–18:00).
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - startsAt
        - endsAt
        - guestName
        - guestEmail
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int32
        eventTypeId:
          type: integer
          format: int32
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        guestName:
          type: string
        guestEmail:
          type: string
          format: email
        comment:
          type: string
          description: Комментарий гостя владельцу (тема звонка и т. п.)
        status:
          $ref: '#/components/schemas/BookingStatus'
        createdAt:
          type: string
          format: date-time
      description: 'Бронирование: гость занял конкретный слот под конкретный тип события'
      example:
        id: 1
        eventTypeId: 1
        startsAt: '2026-07-27T10:00:00Z'
        endsAt: '2026-07-27T10:30:00Z'
        guestName: Иван Петров
        guestEmail: ivan@example.com
        comment: Хочу обсудить проект
        status: active
        createdAt: '2026-07-21T12:00:00Z'
    BookingCreate:
      type: object
      required:
        - eventTypeId
        - startsAt
        - guestName
        - guestEmail
      properties:
        eventTypeId:
          type: integer
          format: int32
        startsAt:
          type: string
          format: date-time
          description: Начало выбранного слота, UTC. Должно совпадать со слотом из GET /api/slots.
        guestName:
          type: string
          minLength: 1
        guestEmail:
          type: string
          format: email
        comment:
          type: string
      description: Данные для создания бронирования гостем
    BookingStatus:
      type: string
      enum:
        - active
        - cancelled
    ConflictError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - slot_unavailable
        message:
          type: string
      description: '409 — конфликт: слот уже занят или находится в прошлом'
    EventType:
      type: object
      required:
        - id
        - name
        - durationMinutes
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
          description: Длительность встречи в минутах. В MVP всегда 30.
          default: 30
      description: Тип события — то, на что гость записывается (например, «Вводный звонок»)
      example:
        id: 1
        name: Вводный звонок
        description: Знакомство и обсуждение задачи
        durationMinutes: 30
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
      description: Ошибка одного поля при валидации
    NotFoundError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - not_found
        message:
          type: string
      description: 404 — ресурс не найден
    Owner:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
          description: Отображаемое имя, показывается гостю на странице бронирования
        email:
          type: string
          format: email
      description: Владелец календаря. В MVP владелец один, создаётся при инициализации приложения.
      example:
        id: 1
        name: Кирилл Чистов
        email: owner@example.com
    Session:
      type: object
      required:
        - owner
      properties:
        owner:
          $ref: '#/components/schemas/Owner'
      description: Активная сессия
    SessionCreate:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
      description: Учётные данные владельца для входа
    Slot:
      type: object
      required:
        - startsAt
        - endsAt
      properties:
        startsAt:
          type: string
          format: date-time
          description: Начало слота, UTC
        endsAt:
          type: string
          format: date-time
          description: Конец слота, UTC (startsAt + 30 минут)
      description: |-
        Свободный 30-минутный слот. Вычисляется на лету из правил доступности
        за вычетом активных бронирований — в базе не хранится.
      example:
        startsAt: '2026-07-27T10:00:00Z'
        endsAt: '2026-07-27T10:30:00Z'
    UnauthorizedError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - unauthorized
        message:
          type: string
      description: 401 — нет активной сессии владельца или неверные учётные данные
    ValidationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - validation_error
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
      description: 422 — ошибка валидации входных данных
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: cookie
      name: session
servers:
  - url: http://localhost:5001
    description: Локальный сервер разработки
    variables: {}
